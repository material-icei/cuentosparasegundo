<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Mis Dibujos Mágicos!</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primario: #FF6B6B;
            --color-secundario: #FFD93D;
            --fondo: #0f0c29;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            font-family: 'Nunito', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Estrellas animadas de fondo */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: transparent;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Baloo 2', cursive;
            font-size: 2.5rem;
            color: var(--color-secundario);
            text-shadow: 0 0 15px rgba(255, 217, 61, 0.6);
            margin: 10px 0;
        }

        /* Contenedor del Carrusel */
        .carousel-wrapper {
            position: relative;
            width: 90vw;
            max-width: 1000px;
            /* Forzamos la relación de aspecto 1366x768 */
            aspect-ratio: 1366 / 768; 
            background: rgba(255, 255, 255, 0.05);
            border: 6px solid white;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Para que la imagen no se deforme */
        }

        /* Botones de Navegación */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            color: var(--color-primario);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
            z-index: 10;
        }

        .nav-btn:hover {
            transform: translateY(-50%) scale(1.1);
            background: var(--color-secundario);
        }

        .btn-left { left: 20px; }
        .btn-right { right: 20px; }

        /* Indicador de página (bolitas) */
        .indicators {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .dot {
            width: 18px;
            height: 18px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        .dot.active {
            background: var(--color-primario);
            transform: scale(1.4);
            box-shadow: 0 0 10px var(--color-primario);
        }

        .footer {
            margin-top: auto;
            padding-bottom: 30px;
        }

        .btn-back {
            text-decoration: none;
            background: var(--color-primario);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-family: 'Baloo 2', cursive;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            transition: 0.3s;
        }

        .btn-back:hover {
            transform: scale(1.05);
            background: #ff4f4f;
        }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <header>
        <h1>✨ Mi Galería de Cuentos ✨</h1>
    </header>

    <div class="carousel-wrapper">
        <button class="nav-btn btn-left" onclick="moveSlide(-1)">❮</button>
        <button class="nav-btn btn-right" onclick="moveSlide(1)">❯</button>
        
        <div class="carousel-track" id="track">
            <div class="slide"><img src="imagenes/pagina1.png" alt="Imagen 1"></div>
            <div class="slide"><img src="imagenes/pagina2.png" alt="Imagen 2"></div>
            <div class="slide"><img src="imagenes/pagina3.png" alt="Imagen 3"></div>
            <div class="slide"><img src="imagenes/pagina4.png" alt="Imagen 4"></div>
            <div class="slide"><img src="imagenes/pagina5.png" alt="Imagen 5"></div>
            <div class="slide"><img src="imagenes/pagina6.png" alt="Imagen 6"></div>
            <div class="slide"><img src="imagenes/pagina7.png" alt="Imagen 7"></div>
        </div>
    </div>

    <div class="indicators" id="dotsContainer"></div>

    <div class="footer">
        <a href="index.html" class="btn-back">🏠 Volver al inicio</a>
    </div>

    <script>
        const track = document.getElementById('track');
        const dotsContainer = document.getElementById('dotsContainer');
        const slides = document.querySelectorAll('.slide');
        let index = 0;

        // Crear los puntitos de abajo automáticamente
        slides.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if (i === 0) dot.classList.add('active');
            dot.onclick = () => goToSlide(i);
            dotsContainer.appendChild(dot);
        });

        const dots = document.querySelectorAll('.dot');

        function moveSlide(step) {
            index += step;
            if (index >= slides.length) index = 0;
            if (index < 0) index = slides.length - 1;
            updateCarousel();
        }

        function goToSlide(n) {
            index = n;
            updateCarousel();
        }

        function updateCarousel() {
            track.style.transform = `translateX(-${index * 100}%)`;
            dots.forEach(d => d.classList.remove('active'));
            dots[index].classList.add('active');
        }

        // Generar algunas estrellas decorativas
        const starsBox = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.width = '2px';
            star.style.height = '2px';
            star.style.background = 'white';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.opacity = Math.random();
            starsBox.appendChild(star);
        }

        // Soporte para flechas del teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') moveSlide(1);
            if (e.key === 'ArrowLeft') moveSlide(-1);
        });
    </script>
</body>
</html>
